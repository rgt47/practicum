<script>
(function () {
  const KEY = 'navHideAll';

  function applyState() {
    const hide = localStorage.getItem(KEY) === '1';
    document.body.classList.toggle('nav-hide-all', hide);
    const btn = document.getElementById('nav-toggle-all');
    if (btn) {
      btn.setAttribute('aria-pressed', hide);
      btn.setAttribute('title', hide ? 'Show navigation' : 'Hide navigation');
    }
  }

  function buildButton() {
    if (document.getElementById('nav-toggle-bar')) return;
    const bar = document.createElement('div');
    bar.id = 'nav-toggle-bar';
    bar.innerHTML = `
      <button id="nav-toggle-all" type="button"
              title="Hide navigation"
              aria-label="Toggle navigation panels">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"
             aria-hidden="true">
          <path d="M0 1.5A1.5 1.5 0 0 1 1.5 0h13A1.5 1.5 0 0 1 16 1.5v13a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 14.5v-13zM5 1H1.5a.5.5 0 0 0-.5.5v13a.5.5 0 0 0 .5.5H5V1zm6 0v14h3.5a.5.5 0 0 0 .5-.5v-13a.5.5 0 0 0-.5-.5H11zM6 1v14h4V1H6z"/>
        </svg>
      </button>`;
    document.body.appendChild(bar);

    document.getElementById('nav-toggle-all')
      .addEventListener('click', () => {
        const cur = localStorage.getItem(KEY) === '1';
        localStorage.setItem(KEY, cur ? '0' : '1');
        applyState();
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      buildButton();
      applyState();
    });
  } else {
    buildButton();
    applyState();
  }
})();
</script>
